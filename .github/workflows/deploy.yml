name: Deploy Wiki

on:
  push:
    branches: [ master ]  # 根据你的主分支名调整

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必需：允许推送 pages

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Build Site
        run: python scripts/main.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3  # 修正这里
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: pages
